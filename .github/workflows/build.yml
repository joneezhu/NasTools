name: NAStool Docker
# 构建 Alpine + Debian 两种 Docker 镜像并推送 Docker Hub
#   - Alpine: tag <ver> / latest
#   - Debian: tag <ver>-debian / debian
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Docker Image (${{ matrix.flavor.name }})
    strategy:
      fail-fast: false
      matrix:
        flavor:
          - name: Alpine
            dockerfile: docker/Dockerfile
            version_suffix: ''
            extra_tag: latest
          - name: Debian
            dockerfile: docker/debian.Dockerfile
            version_suffix: '-debian'
            extra_tag: debian
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Release version
        run: |
          set -euo pipefail
          app_version=$(sed -ne "s/APP_VERSION[[:space:]]*=[[:space:]]*'v\(.*\)'/\1/p" version.py)
          if [ -z "$app_version" ]; then
            echo "::error::Failed to parse APP_VERSION from version.py"
            exit 1
          fi
          echo "app_version=${app_version}${{ matrix.flavor.version_suffix }}" >> $GITHUB_ENV

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKER_USERNAME }}/nastools
          tags: |
            type=raw,value=${{ env.app_version }}
            type=raw,value=${{ matrix.flavor.extra_tag }}

      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: ${{ matrix.flavor.dockerfile }}
          platforms: |
            linux/amd64
            linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
