name: NAStool Package
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  Windows-build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Init Python 3.10.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.11'

      - name: Install dependent packages
        run: |
          python -m pip install --upgrade 'pip<25' 'setuptools<70'
          pip install wheel cython numpy==1.23.5 pyparsing==3.0.9 wxpython==4.2.0 pyinstaller==5.7.0
          pip install --no-build-isolation 'fast-bencode==1.1.3'
          pip install -r package/requirements.txt
          echo ("NASTOOL_CONFIG=${{ github.workspace }}/config/config.yaml") >> $env:GITHUB_ENV
          echo $env:NASTOOL_CONFIG
        shell: pwsh

      - name: Package through pyinstaller
        run: |
          dir
          copy .\package\rely\upx.exe c:\hostedtoolcache\windows\python\3.10.11\x64\Scripts
          copy .\package\rely\hook-cn2an.py c:\hostedtoolcache\windows\python\3.10.11\x64\lib\site-packages\pyinstaller\hooks
          copy .\package\rely\hook-zhconv.py c:\hostedtoolcache\windows\python\3.10.11\x64\lib\site-packages\pyinstaller\hooks
          copy .\package\rely\hook-iso639.py c:\hostedtoolcache\windows\python\3.10.11\x64\lib\site-packages\pyinstaller\hooks
          copy .\third_party.txt .\package
          # setuptools 69+ 不再带 _vendor/pyparsing/diagram/ 目录, 必须先建
          if (-not (Test-Path "c:\hostedtoolcache\windows\Python\3.10.11\x64\lib\site-packages\setuptools\_vendor\pyparsing\diagram")) {
            New-Item -ItemType Directory -Force -Path "c:\hostedtoolcache\windows\Python\3.10.11\x64\lib\site-packages\setuptools\_vendor\pyparsing\diagram" | Out-Null
          }
          copy .\package\rely\template.jinja2 c:\hostedtoolcache\windows\Python\3.10.11\x64\lib\site-packages\setuptools\_vendor\pyparsing\diagram
          xcopy .\web c:\hostedtoolcache\windows\python\3.10.11\x64\lib\site-packages\web\ /e
          xcopy .\config c:\hostedtoolcache\windows\python\3.10.11\x64\lib\site-packages\config\ /e
          xcopy .\scripts c:\hostedtoolcache\windows\python\3.10.11\x64\lib\site-packages\scripts\ /e
          cd package
          pyinstaller nas-tools.spec
          dir .\dist
        shell: pwsh

      - name: Upload windows file
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: ${{ github.workspace }}/package/dist/nas-tools.exe

  Linux-build-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Init Python 3.10.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.11'

      - name: Install dependent packages
        run: |
          python -m pip install --upgrade 'pip<25' 'setuptools<70'
          pip install wheel cython pyinstaller==5.7.0
          pip install --no-build-isolation 'fast-bencode==1.1.3'
          pip install -r package/requirements.txt
          echo "NASTOOL_CONFIG=${{ github.workspace }}/config/config.yaml" >> $GITHUB_ENV
          echo $NASTOOL_CONFIG
        shell: bash

      - name: Package through pyinstaller
        run: |
          pwd
          ls -all
          cp ./package/rely/hook-cn2an.py /opt/hostedtoolcache/Python/3.10.11/x64/lib/python3.10/site-packages/PyInstaller/hooks/
          cp ./package/rely/hook-zhconv.py /opt/hostedtoolcache/Python/3.10.11/x64/lib/python3.10/site-packages/PyInstaller/hooks/
          cp ./package/rely/hook-iso639.py /opt/hostedtoolcache/Python/3.10.11/x64/lib/python3.10/site-packages/PyInstaller/hooks/
          cp ./third_party.txt ./package/
          # setuptools 69+ 不再带 _vendor/pyparsing/diagram/ 目录, 必须先建
          mkdir -p /opt/hostedtoolcache/Python/3.10.11/x64/lib/python3.10/site-packages/setuptools/_vendor/pyparsing/diagram/
          cp ./package/rely/template.jinja2 /opt/hostedtoolcache/Python/3.10.11/x64/lib/python3.10/site-packages/setuptools/_vendor/pyparsing/diagram/
          cp -r ./web/. /opt/hostedtoolcache/Python/3.10.11/x64/lib/python3.10/site-packages/web/
          cp -r ./config/. /opt/hostedtoolcache/Python/3.10.11/x64/lib/python3.10/site-packages/config/
          cp -r ./scripts/. /opt/hostedtoolcache/Python/3.10.11/x64/lib/python3.10/site-packages/scripts/
          cd package
          pyinstaller nas-tools.spec
          mv ${{ github.workspace }}/package/dist/nas-tools ${{ github.workspace }}/package/dist/nas-tools.linux.amd64
          ls -all ${{ github.workspace }}/package/dist
        shell: bash

      - name: Upload linux file
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: ${{ github.workspace }}/package/dist/nas-tools.linux.amd64

  Linux-build-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Package through pyinstaller
        run: |
          mkdir rootfs
          docker buildx build --platform linux/arm64 --file ./package/builder/Dockerfile --build-arg branch=master --output type=local,dest=./rootfs .
          mkdir -p ${{ github.workspace }}/package/dist/
          cp ./rootfs/nas-tools ${{ github.workspace }}/package/dist/nas-tools.linux.arm64
        shell: bash

      - name: Upload linux file
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: ${{ github.workspace }}/package/dist/nas-tools.linux.arm64

  Linux-build-amd64-musl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Package through pyinstaller
        run: |
          mkdir rootfs
          docker buildx build --platform linux/amd64 --file ./package/builder/alpine.Dockerfile --build-arg branch=master --output type=local,dest=./rootfs .
          mkdir -p ${{ github.workspace }}/package/dist/
          cp ./rootfs/nas-tools ${{ github.workspace }}/package/dist/nas-tools.linux.musl.amd64
        shell: bash

      - name: Upload linux file
        uses: actions/upload-artifact@v4
        with:
          name: linux-musl-amd64
          path: ${{ github.workspace }}/package/dist/nas-tools.linux.musl.amd64

  Linux-build-arm64-musl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Package through pyinstaller
        run: |
          mkdir rootfs
          docker buildx build --platform linux/arm64 --file ./package/builder/alpine.Dockerfile --build-arg branch=master --output type=local,dest=./rootfs .
          mkdir -p ${{ github.workspace }}/package/dist/
          cp ./rootfs/nas-tools ${{ github.workspace }}/package/dist/nas-tools.linux.musl.arm64
        shell: bash

      - name: Upload linux file
        uses: actions/upload-artifact@v4
        with:
          name: linux-musl-arm64
          path: ${{ github.workspace }}/package/dist/nas-tools.linux.musl.arm64

  Mac-build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Init Python 3.10.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.11'

      - name: Install dependent packages
        run: |
          python -m pip install --upgrade 'pip<25' 'setuptools<70'
          pip install wheel cython numpy==1.23.5 pyparsing==3.0.9 pyinstaller==5.7.0
          pip install --no-build-isolation 'fast-bencode==1.1.3'
          pip install -r package/requirements.txt
          echo "NASTOOL_CONFIG=${{ github.workspace }}/config/config.yaml" >> $GITHUB_ENV
          echo $NASTOOL_CONFIG
        shell: bash

      - name: Package through pyinstaller
        run: |
          pwd
          ls -all
          cp ./package/rely/hook-cn2an.py $Python_ROOT_DIR/lib/python3.10/site-packages/PyInstaller/hooks/
          cp ./package/rely/hook-zhconv.py $Python_ROOT_DIR/lib/python3.10/site-packages/PyInstaller/hooks/
          cp ./package/rely/hook-iso639.py $Python_ROOT_DIR/lib/python3.10/site-packages/PyInstaller/hooks/
          cp ./third_party.txt ./package/
          # setuptools 69+ 不再带 _vendor/pyparsing/diagram/ 目录, 必须先建
          mkdir -p $Python_ROOT_DIR/lib/python3.10/site-packages/setuptools/_vendor/pyparsing/diagram/
          cp ./package/rely/template.jinja2 $Python_ROOT_DIR/lib/python3.10/site-packages/setuptools/_vendor/pyparsing/diagram/
          cp -r ./web/. $Python_ROOT_DIR/lib/python3.10/site-packages/web/
          cp -r ./config/. $Python_ROOT_DIR/lib/python3.10/site-packages/config/
          cp -r ./scripts/. $Python_ROOT_DIR/lib/python3.10/site-packages/scripts/
          cd package
          pyinstaller nas-tools.spec
          mv ./dist/nas-tools ./dist/nas-tools.macos
          ls -all ./dist/
        shell: bash

      - name: Upload mac file
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: ${{ github.workspace }}/package/dist/nas-tools.macos

  Create-release_Send-message:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [Windows-build, Linux-build-amd64, Linux-build-arm64, Linux-build-amd64-musl, Linux-build-arm64-musl, Mac-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Release version
        id: release_version
        run: |
          app_version=$(cat version.py |sed -ne "s/APP_VERSION\s=\s'v\(.*\)'/\1/gp")
          echo "app_version=$app_version" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ github.workspace }}/artifacts

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p ${{ github.workspace }}/releases
          mv ${{ github.workspace }}/artifacts/windows/nas-tools.exe                       ${{ github.workspace }}/releases/nastool_win_v${{ env.app_version }}.exe
          mv ${{ github.workspace }}/artifacts/linux-amd64/nas-tools.linux.amd64           ${{ github.workspace }}/releases/nastool_linux_amd64_v${{ env.app_version }}
          mv ${{ github.workspace }}/artifacts/linux-arm64/nas-tools.linux.arm64           ${{ github.workspace }}/releases/nastool_linux_arm64_v${{ env.app_version }}
          mv ${{ github.workspace }}/artifacts/linux-musl-amd64/nas-tools.linux.musl.amd64 ${{ github.workspace }}/releases/nastool_linux_musl_amd64_v${{ env.app_version }}
          mv ${{ github.workspace }}/artifacts/linux-musl-arm64/nas-tools.linux.musl.arm64 ${{ github.workspace }}/releases/nastool_linux_musl_arm64_v${{ env.app_version }}
          mv ${{ github.workspace }}/artifacts/macos/nas-tools.macos                       ${{ github.workspace }}/releases/nastool_macos_v${{ env.app_version }}
          ls -all ${{ github.workspace }}/releases

      - name: Create Release & Upload Assets
        # 职责分工:
        #   - 本步骤只负责上传 6 个平台二进制 assets, 并保证 Release 存在
        #   - Release 的 title / body (聚合 changelog) 由本地 scripts/release-github.sh 负责填充
        # 实现选择:
        #   - 用 GitHub 官方 gh CLI (runner 自带, 不受仓库 Actions 白名单限制)
        #   - 之前用 softprops/action-gh-release@v2, 但需要在 Settings→Actions 白名单里
        #     额外放行 softprops/action-gh-release@*, 否则报 "is not allowed in joneezhu/NasTools"
        # 行为细节:
        #   - 不写 --notes / --title, 避免覆盖本地脚本写入的聚合 changelog
        #   - prerelease 自动判断: tag 含 -beta./-rc./-alpha. 视为 prerelease
        #   - 已存在 Release: 跳过创建, 只追加 (--clobber) 上传 asset, 保留 title/body
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v${{ env.app_version }}"
          REL_DIR="${{ github.workspace }}/releases"

          # 1) 确保 Release 存在
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, will upload assets to it"
          else
            PRERELEASE_FLAG=""
            case "$TAG" in
              *-beta.*|*-rc.*|*-alpha.*) PRERELEASE_FLAG="--prerelease" ;;
            esac
            echo "Creating Release $TAG (prerelease=${PRERELEASE_FLAG:-false})"
            # --notes "" 显式空 body, 让本地 release-github.sh 后续覆盖
            # --target 不传, gh 默认指向 tag 所指 commit
            gh release create "$TAG" $PRERELEASE_FLAG --notes "" --title "$TAG"
          fi

          # 2) 上传所有 6 个平台 binary, --clobber 允许覆盖已有同名 asset
          echo "Uploading assets from $REL_DIR"
          ls -al "$REL_DIR"
          gh release upload "$TAG" "$REL_DIR"/* --clobber

          echo "✅ Release $TAG assets uploaded"
